services:
  api:
    build:
      context: .
      target: api
    command: npm run dev --workspace server
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      JWT_SECRET: splitsmart-local-dev-secret
      DATABASE_URL: postgres://splitsmart:splitsmart@postgres:5432/splitsmart
      REDIS_URL: redis://redis:6379
    volumes:
      - ./server:/app/server
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci --workspaces && npm run dev --workspace client"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: splitsmart
      POSTGRES_PASSWORD: splitsmart
      POSTGRES_DB: splitsmart
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitsmart -d splitsmart"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
